name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog_entry:
        description: "Changelog entry (what changed?)"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        id: new_version
        run: |
          npm version ${{ github.event.inputs.bump_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          ENTRY="${{ github.event.inputs.changelog_entry }}"

          # Create temporary changelog with new entry
          echo "# Change Log" > /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          echo 'All notable changes to the "file-size-viewer" extension will be documented in this file.' >> /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          echo "Check [Keep a Changelog](http://keepachangelog.com/) for recommendations on how to structure this file." >> /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          echo "## [$NEW_VERSION] - $DATE" >> /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          echo "### Changed" >> /tmp/new_changelog.md
          echo "- $ENTRY" >> /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md

          # Append old changelog entries (skip the header lines)
          tail -n +7 CHANGELOG.md >> /tmp/new_changelog.md

          # Replace original changelog
          git push origin main

      - name: Summary
        run: |
          echo "### ✅ Version Bumped!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Version:** ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** ${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ github.event.inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Release workflow will trigger automatically!" >> $GITHUB_STEP_SUMMARY
