name: Release Extension

on:
  workflow_run:
    workflows: ["Bump Version"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (leave empty to use package.json version)"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run if triggered manually, by push, or if the Bump Version workflow succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for push to propagate
        if: github.event_name == 'workflow_run'
        run: sleep 10

      - name: Pull latest changes
        if: github.event_name == 'workflow_run'
        run: |
          git pull origin main
          echo "Current commit:"
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: package_version
        run: |
          echo "=== Debugging Version Info ==="
          echo "Current directory: $(pwd)"
          echo "Git branch: $(git branch --show-current)"
          echo "Latest commit: $(git log -1 --oneline)"
          echo "package.json exists: $(test -f package.json && echo 'yes' || echo 'no')"
          echo "CHANGELOG.md exists: $(test -f CHANGELOG.md && echo 'yes' || echo 'no')"

          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi

          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.package_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.package_version.outputs.version }}"

          # Extract the changelog section for this version
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit;
              if ($0 ~ "\\[" ver "\\]") {
                found=1;
                next;
              }
            }
            found && /^## \[/ { exit; }
            found { print; }
          ' CHANGELOG.md > /tmp/release_notes.md

          # Check if we found content
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
          fi

          # Set output (GitHub Actions supports multiline)
          {
            echo 'notes<<EOF'
            cat /tmp/release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Compile extension
        run: npm run compile

      - name: Run linter
        run: npm run lint

      - name: Package extension
        run: npx @vscode/vsce package
        continue-on-error: true

      - name: Create Git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.package_version.outputs.tag }}" -m "Release ${{ steps.package_version.outputs.tag }}"
          git push origin "${{ steps.package_version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package_version.outputs.tag }}
          name: Release ${{ steps.package_version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            file-size-viewer-${{ steps.package_version.outputs.version }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Release Summary
        run: |
          echo "### 🎉 Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.package_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.package_version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Notes:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/release_notes.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
